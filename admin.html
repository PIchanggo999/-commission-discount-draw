<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="container-center" id="adminLogin">
  <div class="glass-box shadow-lime" style="max-width:400px; width: 90%; text-align: center;">
    <h2 style="color: #B0FF2D;">🔐 ADMIN LOGIN</h2>
    <input id="pw" type="password" placeholder="ADMIN PASSWORD" onkeydown="if(event.key === 'Enter') login()">
    <button class="btn-lime" onclick="login()" style="margin-top: 10px;">로그인</button>
  </div>
</div>

<div id="adminPanel" class="main-wrapper" style="display:none;">
  <div class="marquee-container">
    <div class="marquee-text">◈ 마/참/내【新로운 기회】☞ 정상 영업</div>
  </div>

  <h1 class="main-title glitch" data-text="📊 실시간 관리자 패널">📊 실시간 관리자 패널</h1>
  
  <div class="container">
    <div class="board-container">
      <p style="text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 10px;">(선택된 칸을 클릭하면 선택 전으로 초기화됩니다)</p>
      <div id="adminBoard" class="board grid-5x6"></div>
    </div>

    <div class="sidebar">
      <div class="info-box border-lime">
        <h3 style="color: #B0FF2D;">🛠 상품 관리</h3>
        <div id="adminStock"></div>
        <button onclick="addNewPrize()" style="background:#222; color:#B0FF2D; border:1px solid #B0FF2D; margin-top:10px; font-size: 0.8rem;">+ 상품 추가</button>
      </div>
      
      <div class="btn-group" style="display: flex; flex-direction: column; gap: 5px;">
          <button onclick="resetStock()" style="background:#444;">수량만 풀충전</button>
          <button onclick="resetAll()" style="background:#ff3ca6; color: #000;">전체 판 초기화</button>
          <button onclick="downloadCSV()" style="background:#bc13fe;">로그 다운로드 (CSV)</button>
          <button onclick="goMain()" style="background:#B0FF2D; color: #000;">실시간 화면으로</button>
      </div>

      <div class="info-box bg-white-cyan-text">
          <h3>📝 실시간 로그</h3>
          <ul id="logList" class="log-list"></ul>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
